name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [win-x64, win-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish
        run: |
          dotnet publish -c Release -r ${{ matrix.arch }} --self-contained -o publish -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true
          Rename-Item publish/cimipkg.exe "cimipkg-${{ matrix.arch }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cimipkg-${{ matrix.arch }}
          path: publish/cimipkg-${{ matrix.arch }}.exe
