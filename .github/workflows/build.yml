name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [win-x64, win-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish
        run: |
          dotnet publish -c Release -r ${{ matrix.arch }} --self-contained -o publish/${{ matrix.arch }} -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cimipkg-${{ matrix.arch }}
          path: publish/${{ matrix.arch }}/cimipkg.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: cimipkg-win-x64
          path: release/x64

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: cimipkg-win-arm64
          path: release/arm64

      - name: Generate version
        id: version
        run: echo "version=$(date -u +'%Y.%m.%d.%H%M')" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: cimipkg ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            release/x64/cimipkg.exe
            release/arm64/cimipkg.exe
